site_name: Alex (Shih-Wei) Hung — QA Engineering Portfolio
site_description: Senior QA Lead · Test Automation · SDET
site_url: https://shihweihung.github.io/qa-engineering-portfolio/
repo_url: https://github.com/shihweihung/qa-engineering-portfolio
repo_name: shihweihung/qa-engineering-portfolio
edit_uri: ""

theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shihweihung/qa-engineering-portfolio
      name: GitHub
  homepage: https://shihweihung.github.io/qa-engineering-portfolio/

copyright: Copyright &copy; 2026 Alex (Shih-Wei) Hung

nav:
  - Home: index.md
  - About: about/index.md
  - Resume: resume/index.md
  - Projects:
      - Overview: projects/index.md
      - Mobile Reading App: projects/mobile-reading-app.md
      - Automation Framework Decision: projects/automation-framework-decision.md
      - Production Incident Investigation: projects/production-incident.md
      - AI Resume Evaluation System: projects/ai-resume-evaluation.md
  - Automation:
      - Overview: automation/index.md
      - API Testing: automation/api-automation.md
  - AI-Assisted QA:
      - Overview: ai-assisted-qa/index.md
      - Test Case Generation: ai-assisted-qa/test-generation.md
      - Bug Investigation: ai-assisted-qa/bug-investigation.md
      - Daily Workflow: ai-assisted-qa/daily-workflow.md
  - Mobile Testing: mobile-testing/index.md
  - API Testing: api-testing/index.md
  - Leadership:
      - Overview: leadership/index.md
      - QA Planning: leadership/qa-planning.md
      - Mentoring: leadership/mentoring.md
      - Cross-Functional Communication: leadership/cross-functional.md
  - Knowledge Notes:
      - Overview: knowledge-notes/index.md
      - Framework Adoption: knowledge-notes/framework-adoption.md
      - Flaky Test Management: knowledge-notes/flaky-tests.md
      - Release Readiness: knowledge-notes/release-readiness.md
      - 與 DQA 的合作: knowledge-notes/qa-dqa-collaboration.md
      - 測試 AI 系統的思維轉變: knowledge-notes/testing-ai-systems.md
